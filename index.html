<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營收股價策略</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;
      min-height:100vh;display:flex;justify-content:center;padding:16px}
.container{width:100%;max-width:480px}
h1{font-size:1.4rem;padding:20px 0 4px}
.date{color:#888;font-size:0.95rem;padding-bottom:16px}
.card{border-radius:12px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;
              margin-bottom:10px;font-weight:600;font-size:1.05rem}
.count{font-size:0.9rem;opacity:0.85}
.buy{background:#1b4332}
.sell{background:#4a1525}
.hold{background:#2a2a3e}
.tag{display:inline-block;background:rgba(255,255,255,0.12);
     padding:6px 14px;border-radius:8px;margin:3px 4px;font-size:1rem}
.empty{color:#888;font-size:0.95rem}
</style>
</head>
<body>
<div class="container">
<h1>營收股價策略</h1>
<div class="date">2026-03-10</div>

<div class="card buy">
  <div class="card-header"><span>買入</span><span class="count">3 檔</span></div>
  <div><span class="tag">5386</span> <span class="tag">6861</span> <span class="tag">4749</span></div>
</div>

<div class="card sell">
  <div class="card-header"><span>賣出</span><span class="count">0 檔</span></div>
  <div><span class="empty">（無）</span></div>
</div>

<div class="card hold">
  <div class="card-header"><span>目前持股</span><span class="count">3 檔</span></div>
  <div><span class="tag">4749</span> <span class="tag">5386</span> <span class="tag">6861</span></div>
</div>
</div>
</body>
</html>
